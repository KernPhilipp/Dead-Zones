name: Godot Web Export → Render Deploy

on:
  push:
    branches: ["main"]
  workflow_dispatch:

env:
  GODOT_VERSION: "4.6"

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Godot Web Export
        uses: firebelley/godot-export@v5.2.1
        with:
          godot_executable_download_url: >-
            https://github.com/godotengine/godot/releases/download/${{ env.GODOT_VERSION }}-stable/Godot_v${{ env.GODOT_VERSION }}-stable_linux.x86_64.zip
          godot_export_templates_download_url: >-
            https://github.com/godotengine/godot/releases/download/${{ env.GODOT_VERSION }}-stable/Godot_v${{ env.GODOT_VERSION }}-stable_export_templates.tpz
          relative_project_path: ./
          archive_output: false
          cache: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Godot Linux Server Export
        uses: firebelley/godot-export@v5.2.1
        with:
          godot_executable_download_url: >-
            https://github.com/godotengine/godot/releases/download/${{ env.GODOT_VERSION }}-stable/Godot_v${{ env.GODOT_VERSION }}-stable_linux.x86_64.zip
          godot_export_templates_download_url: >-
            https://github.com/godotengine/godot/releases/download/${{ env.GODOT_VERSION }}-stable/Godot_v${{ env.GODOT_VERSION }}-stable_export_templates.tpz
          relative_project_path: ./
          archive_output: false
          export_name: "Linux Server"
          cache: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Build & Push Server Docker Image
        if: ${{ secrets.RENDER_DEPLOY_HOOK != '' }}
        run: |
          mkdir -p builds/Server
          cp /home/runner/.local/share/godot/builds/Linux\ Server/dead_zones_server.x86_64 builds/Server/ || true
          cp /home/runner/.local/share/godot/builds/Linux\ Server/dead_zones_server.pck builds/Server/ || true
          # Trigger Render redeploy via deploy hook (set RENDER_DEPLOY_HOOK in repo secrets)
          curl -s -X POST "${{ secrets.RENDER_DEPLOY_HOOK }}"

      - name: Push to render-deploy Branch
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: /home/runner/.local/share/godot/builds/Web
          publish_branch: render-deploy
          force_orphan: true
          commit_message: "Deploy: ${{ github.sha }}"
